<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>3-Tier App Demo by the Ravinadh</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e3a5f);
      min-height: 100vh;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .container { max-width: 700px; width: 100%; text-align: center; }
    h1 { font-size: 2.5rem; color: #38bdf8; margin-bottom: 0.5rem; }
    p.subtitle { color: #94a3b8; margin-bottom: 2rem; }
    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(56,189,248,0.2);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .card h2 { color: #38bdf8; margin-bottom: 0.75rem; font-size: 1.1rem; }
    input {
      width: 100%; padding: 0.75rem 1rem;
      border-radius: 8px; border: 1px solid #334155;
      background: #1e293b; color: #e2e8f0;
      font-size: 1rem; margin-bottom: 0.75rem;
    }
    button {
      background: #0ea5e9; color: #fff;
      border: none; padding: 0.75rem 2rem;
      border-radius: 8px; font-size: 1rem;
      cursor: pointer; transition: background 0.2s;
    }
    button:hover { background: #000000; }
    #result {
      margin-top: 1rem; padding: 1rem;
      background: #0f172a; border-radius: 8px;
      min-height: 48px; font-size: 0.95rem;
      color: #7dd3fc; word-break: break-all;
    }
    .status { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
    .badge {
      padding: 0.4rem 1rem; border-radius: 20px;
      font-size: 0.8rem; font-weight: 600;
    }
    .green { background: #052e16; color: #4ade80; border: 1px solid #16a34a; }
    .blue  { background: #0c1a3e; color: #60a5fa; border: 1px solid #2563eb; }
    .yellow{ background: #2d1a00; color: #fbbf24; border: 1px solid #d97706; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚀 3-Tier App Demo</h1>
    <p class="subtitle">GitHub Actions → DockerHub → EC2 Deployment</p>

    <div class="card">
      <h2>🟢 Architecture Status</h2>
      <div class="status">
        <span class="badge green">Frontend ✓ Running</span>
        <span class="badge blue">Backend API ✓ Running</span>
        <span class="badge yellow">Database ✓ Connected</span>
      </div>
    </div>

    <div class="card">
      <h2>📝 Add a Note (Backend API Test)</h2>
      <input type="text" id="noteInput" placeholder="Type a note and save it..."/>
      <button onclick="saveNote()">Save Note</button>
      <div id="result">Results will appear here...</div>
    </div>

    <div class="card">
      <h2>📋 All Notes</h2>
      <button onclick="getNotes()" style="background:#334155;">Load Notes</button>
      <div id="notesList" style="margin-top:1rem; text-align:left;"></div>
    </div>
  </div>

  <script>
    const API = window.location.protocol + '//' + window.location.hostname + ':5000';

    async function saveNote() {
      const text = document.getElementById('noteInput').value.trim();
      if (!text) return;
      try {
        const res = await fetch(`${API}/api/notes`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text })
        });
        const data = await res.json();
        document.getElementById('result').innerText = '✅ Saved: ' + JSON.stringify(data);
        document.getElementById('noteInput').value = '';
      } catch(e) {
        document.getElementById('result').innerText = '❌ Error: ' + e.message;
      }
    }

    async function getNotes() {
      try {
        const res = await fetch(`${API}/api/notes`);
        const data = await res.json();
        const list = document.getElementById('notesList');
        if (!data.length) { list.innerHTML = '<p style="color:#64748b">No notes yet.</p>'; return; }
        list.innerHTML = data.map(n =>
          `<div style="padding:0.5rem; border-bottom:1px solid #1e293b">📌 ${n.text}</div>`
        ).join('');
      } catch(e) {
        document.getElementById('notesList').innerText = '❌ Error: ' + e.message;
      }
    }
  </script>
</body>
</html>
