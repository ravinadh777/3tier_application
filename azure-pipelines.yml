# ============================================================
# 3-Tier App CI/CD Pipeline — Azure DevOps
# Converts GitHub Actions workflow to Azure Pipelines
# Build & Push to DockerHub → Deploy to Azure App Service
# ============================================================

trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

# ============================================================
# VARIABLES — set these in Azure DevOps Pipeline → Variables
# DOCKERHUB_TOKEN  → mark as secret
# ============================================================
variables:
  dockerHubUser: 'massey123'
  frontendImage: 'massey123/3tier-frontend'
  backendImage:  'massey123/3tier-backend'
  tag: '$(Build.SourceVersion)'   # same as github.sha

# ============================================================
# STAGE 1 — BUILD & PUSH DOCKER IMAGES TO DOCKERHUB
# ============================================================
stages:
- stage: Build
  displayName: 'Build and Push Docker Images'
  jobs:
  - job: BuildAndPush
    displayName: 'Build and Push'
    steps:

    # Step 1 — Checkout code from GitHub
    - checkout: self
      displayName: 'Checkout source code'

    # Step 2 — Set up Docker Buildx
    - script: |
        docker buildx create --use
        docker buildx inspect --bootstrap
      displayName: 'Set up Docker Buildx'

    # Step 3 — Login to DockerHub
    - script: |
        echo "$(DOCKERHUB_TOKEN)" | docker login -u $(dockerHubUser) --password-stdin
      displayName: 'Login to DockerHub'
      env:
        DOCKERHUB_TOKEN: $(DOCKERHUB_TOKEN)   # linked from pipeline secret variable

    # Step 4 — Build and Push Frontend Image
    - script: |
        docker buildx build \
          --platform linux/amd64 \
          --push \
          -t $(frontendImage):$(tag) \
          -t $(frontendImage):latest \
          ./frontend
      displayName: 'Build and Push Frontend Image'

    # Step 5 — Build and Push Backend Image
    - script: |
        docker buildx build \
          --platform linux/amd64 \
          --push \
          -t $(backendImage):$(tag) \
          -t $(backendImage):latest \
          ./backend
      displayName: 'Build and Push Backend Image'

    # Step 6 — Summary
    - script: |
        echo "✅ Frontend pushed → $(frontendImage):latest"
        echo "✅ Backend  pushed → $(backendImage):latest"
      displayName: 'Build Summary'

# ============================================================
# STAGE 2 — DEPLOY TO AZURE APP SERVICE (replaces EC2)
# Uses Azure's built-in hosting — no SSH / EC2 needed
# ============================================================
- stage: Deploy
  displayName: 'Deploy to Azure App Service'
  dependsOn: Build
  condition: succeeded()
  jobs:

  # ---- Deploy Frontend ----
  - job: DeployFrontend
    displayName: 'Deploy Frontend'
    steps:
    - task: AzureWebAppContainer@1
      displayName: 'Deploy Frontend container to Azure App Service'
      inputs:
        azureSubscription: 'MyAzureServiceConnection'   # ← your service connection name
        appName: '3tier-frontend-app'                   # ← your Azure App Service name
        containers: '$(frontendImage):latest'

  # ---- Deploy Backend ----
  - job: DeployBackend
    displayName: 'Deploy Backend'
    steps:
    - task: AzureWebAppContainer@1
      displayName: 'Deploy Backend container to Azure App Service'
      inputs:
        azureSubscription: 'MyAzureServiceConnection'   # ← your service connection name
        appName: '3tier-backend-app'                    # ← your Azure App Service name
        containers: '$(backendImage):latest'

  # ---- Health Check ----
  - job: HealthCheck
    displayName: 'Health Check'
    dependsOn:
      - DeployFrontend
      - DeployBackend
    steps:
    - script: |
        echo "Waiting 20s for services to start..."
        sleep 20
        echo "Checking Backend health..."
        curl -f https://3tier-backend-app.azurewebsites.net/health || echo "⚠️ Backend health check failed"
        echo "✅ Frontend : https://3tier-frontend-app.azurewebsites.net"
        echo "✅ Backend  : https://3tier-backend-app.azurewebsites.net/health"
        echo "🚀 Deployment complete!"
      displayName: 'Health Check & Summary'
