name: 3-Tier App CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: massey123
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            massey123/3tier-frontend:${{ github.sha }}
            massey123/3tier-frontend:latest

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            massey123/3tier-backend:${{ github.sha }}
            massey123/3tier-backend:latest

      - name: Summary
        run: |
          echo "✅ Frontend pushed → massey123/3tier-frontend:latest"
          echo "✅ Backend  pushed → massey123/3tier-backend:latest"

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml,database/init.sql"
          target: "/home/ubuntu/3tier_application"

      - name: SSH and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /home/ubuntu/3tier_application
            echo "Logging into DockerHub..."
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u massey123 --password-stdin
            echo "Pulling latest images..."
            docker pull massey123/3tier-frontend:latest
            docker pull massey123/3tier-backend:latest
            echo "Stopping old containers..."
            docker-compose down --remove-orphans || true
            echo "Starting all containers..."
            docker-compose up -d
            echo "Waiting 20s for DB to be ready..."
            sleep 20
            echo "Container status:"
            docker-compose ps
            echo "Deployment complete!"
            echo "Frontend : http://${{ secrets.EC2_HOST }}"
            echo "Backend  : http://${{ secrets.EC2_HOST }}:5000/health"
