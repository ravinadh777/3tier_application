name: SonarQube Scan

# ============================================================
# MANUAL TRIGGER — Go to GitHub Actions tab → Run workflow
# ============================================================
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to scan'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - production
      scan_scope:
        description: 'What to scan'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - backend-only
          - frontend-only

  # Also trigger on push to main (optional)
  push:
    branches:
      - main

jobs:
  sonarqube-scan:
    name: SonarQube Code Analysis
    runs-on: ubuntu-latest

    steps:

      # --------------------------------------------------------
      # Step 1: Checkout the repo code
      # --------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history for better analysis

      # --------------------------------------------------------
      # Step 2: Show what triggered the scan
      # --------------------------------------------------------
      - name: Print scan info
        run: |
          echo "============================================"
          echo "  Triggered by : ${{ github.actor }}"
          echo "  Environment  : ${{ github.event.inputs.environment }}"
          echo "  Scan scope   : ${{ github.event.inputs.scan_scope }}"
          echo "  Branch       : ${{ github.ref_name }}"
          echo "  Commit       : ${{ github.sha }}"
          echo "============================================"

      # --------------------------------------------------------
      # Step 3: Set scan path based on scope input
      # --------------------------------------------------------
      - name: Set scan sources
        id: scope
        run: |
          if [ "${{ github.event.inputs.scan_scope }}" == "backend-only" ]; then
            echo "sources=backend" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.inputs.scan_scope }}" == "frontend-only" ]; then
            echo "sources=frontend" >> $GITHUB_OUTPUT
          else
            echo "sources=." >> $GITHUB_OUTPUT
          fi

      # --------------------------------------------------------
      # Step 4: Run SonarQube Scanner via Docker image
      # --------------------------------------------------------
      - name: Run SonarQube Scanner
        run: |
          docker run --rm \
            -e SONAR_HOST_URL="${{ secrets.SONAR_HOST_URL }}" \
            -e SONAR_TOKEN="${{ secrets.SONAR_TOKEN }}" \
            -v "${{ github.workspace }}:/usr/src" \
            sonarsource/sonar-scanner-cli \
            -Dsonar.projectKey=myscan \
            -Dsonar.projectName=myscan \
            -Dsonar.sources=${{ steps.scope.outputs.sources }} \
            -Dsonar.exclusions="**/node_modules/**,**/__pycache__/**,**/*.pyc,**/*.md" \
            -Dsonar.sourceEncoding=UTF-8 \
            -Dsonar.python.version=3 \
            -Dsonar.javascript.file.suffixes=.js,.jsx

      # --------------------------------------------------------
      # Step 5: Print dashboard link
      # --------------------------------------------------------
      - name: Print SonarQube dashboard link
        run: |
          echo "============================================"
          echo "  Scan complete!"
          echo "  View results:"
          echo "  ${{ secrets.SONAR_HOST_URL }}/dashboard?id=myscan"
          echo "============================================"
